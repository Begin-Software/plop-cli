name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: bun install

      - name: Build all targets
        run: |
          bun build ./src/index.ts --compile --target=bun-darwin-arm64 --outfile dist/plop-darwin-arm64
          bun build ./src/index.ts --compile --target=bun-darwin-x64 --outfile dist/plop-darwin-x64
          bun build ./src/index.ts --compile --target=bun-linux-x64 --outfile dist/plop-linux-x64
          bun build ./src/index.ts --compile --target=bun-linux-arm64 --outfile dist/plop-linux-arm64
          bun build ./src/index.ts --compile --target=bun-windows-x64 --outfile dist/plop-windows-x64.exe

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v0.1.$(date +%Y%m%d%H%M%S)"
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          gh release create "$TAG" \
            dist/plop-darwin-arm64 \
            dist/plop-darwin-x64 \
            dist/plop-linux-x64 \
            dist/plop-linux-arm64 \
            dist/plop-windows-x64.exe \
            --title "Plop CLI $TAG" \
            --notes "Self-contained binaries for macOS (arm64, x64), Linux (x64, arm64), and Windows (x64)."

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          BASE_URL="https://github.com/Begin-Software/plop-cli/releases/download/${TAG}"
          SHA_DARWIN_ARM64=$(curl -sL "${BASE_URL}/plop-darwin-arm64" | shasum -a 256 | cut -d' ' -f1)
          SHA_DARWIN_X64=$(curl -sL "${BASE_URL}/plop-darwin-x64" | shasum -a 256 | cut -d' ' -f1)
          SHA_LINUX_X64=$(curl -sL "${BASE_URL}/plop-linux-x64" | shasum -a 256 | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(curl -sL "${BASE_URL}/plop-linux-arm64" | shasum -a 256 | cut -d' ' -f1)
          VERSION="${TAG#v}"

          cat > /tmp/plop.rb <<EOF
          class Plop < Formula
            desc "Put a file on the web. File hosting for AI coding agents."
            homepage "https://plop.so"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/plop-darwin-arm64"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "${BASE_URL}/plop-darwin-x64"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/plop-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "${BASE_URL}/plop-linux-x64"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install stable.url.split("/").last => "plop"
            end

            test do
              assert_match "plop", shell_output("#{bin}/plop version")
            end
          end
          EOF

          cd /tmp
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/Begin-Software/homebrew-tap.git"
          cp /tmp/plop.rb homebrew-tap/Formula/plop.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/plop.rb
          git commit -m "Update plop to ${VERSION}"
          git push
