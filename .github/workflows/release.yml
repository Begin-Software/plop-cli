name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-cli:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install and build
        run: |
          bun install
          bun run build

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v0.1.$(date +%Y%m%d%H%M%S)"
          gh release create "$TAG" \
            dist/plop \
            --title "Plop CLI $TAG" \
            --notes "Self-contained macOS (arm64) binary."
